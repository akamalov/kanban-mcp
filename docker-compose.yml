services:
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-kanban_root}
      MYSQL_DATABASE: ${KANBAN_DB_NAME:-kanban}
      MYSQL_USER: ${KANBAN_DB_USER:-kanban}
      MYSQL_PASSWORD: ${KANBAN_DB_PASSWORD:-changeme}
    volumes:
      - kanban_data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost
      interval: 5s
      retries: 10

  web:
    build: .
    ports:
      - "${KANBAN_WEB_PORT:-5100}:${KANBAN_WEB_PORT:-5100}"
    environment:
      KANBAN_DB_HOST: db
      KANBAN_DB_USER: ${KANBAN_DB_USER:-kanban}
      KANBAN_DB_PASSWORD: ${KANBAN_DB_PASSWORD:-changeme}
      KANBAN_DB_NAME: ${KANBAN_DB_NAME:-kanban}
      KANBAN_WEB_PORT: ${KANBAN_WEB_PORT:-5100}
    depends_on:
      db:
        condition: service_healthy

volumes:
  kanban_data:
